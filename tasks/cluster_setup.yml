---

- name: Create a proxmox cluster
  community.proxmox.proxmox_cluster:
    api_host: "{{ master_node }}"
    api_user: "{{ proxmox_api_user }}"
    api_port: "{{ proxmox_api_port }}"
    api_token_id: "{{ proxmox_token_id }}" # Make sure values is not full string as per proxmox e.g user@pam!token_name only token_name is variable
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ validate_certs }}"
    link0: "{{ ansible_vmbr0.ipv4.address }}"
    link1: 10.10.2.1
    cluster_name: "{{ cluster_name }}"
    state: present
  delegate_to: localhost
  become: false

- name: Get Details cluster info from master node
  community.proxmox.proxmox_cluster:
    api_host: "{{ proxmox_api_url }}"
    api_user: "{{ proxmox_api_user }}"
    api_port: "{{ proxmox_api_port }}"
    api_token_id: "{{ proxmox_token_id }}" # Make sure values is not full string as per proxmox e.g user@pam!token_name only token_name is variable
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ validate_certs }}"
    cluster_name: "{{ cluster_name }}"
  register: discovered_cluster_info
  delegate_to: localhost
  become: false

- name: Debug
  ansible.builtin.debug:
    msg: "{{ discovered_cluster_info }}"

- name: Join host to cluster
  community.proxmox.proxmox_cluster:
    proxmox_host: "{{ proxmox_api_url }}"
    proxmox_user: "{{ proxmox_api_user }}"
    api_port: "{{ proxmox_api_port }}"
    api_token_id: "{{ proxmox_token_id }}" # Make sure values is not full string as per proxmox e.g user@pam!token_name only token_name is variable
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ validate_certs }}"
    cluster_name: "{{ cluster_name }}"
    master_ip: "{{ master_node }}"
    fingerprint: "{{ discovered_cluster_info.fp }}"
