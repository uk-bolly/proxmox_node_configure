---

- name: Check ansible version
  tags: always
  ansible.builtin.assert:
    that: ansible_version.full is version_compare(min_ansible_version, '>=')
    fail_msg: "You must use Ansible {{ min_ansible_version }} or greater"
    success_msg: "This role is running a supported version of ansible {{ ansible_version.full }} >= {{ min_ansible_version }}"

- name: Get proxmox version
  ansible.builtin.shell: "pveversion | cut -d/ -f2"
  changed_when: false
  register: discovered_proxmox_version

- name: Ensure only supported version
  ansible.builtin.assert:
    that: discovered_proxmox_version.stdout is version_compare('9', '==')
    fail_msg: "Sorry Proxmox VE {{ discovered_proxmox_version.stdout }} is not supported"

- name: Run post install settings on node
  tags: post_install
  ansible.builtin.import_tasks:
    file: post_install.yml

- name: Create api user for steps
  when: create_api_user
  tags: user
  ansible.builtin.import_tasks:
    file: token_user.yml

- name: Generate API token
  tags: token
  ansible.builtin.import_tasks:
    file: generate_token.yml

- name: Add Storage - Backup
  when: backup_storage
  tags: backup
  ansible.builtin.import_tasks:
    file: storage/backup.yml

- name: Add Storage - Iscsi
  when: iscsi_storage
  tags: iscsi
  ansible.builtin.import_tasks:
    file: storage/iscsi.yml

- name: Add Storage - nfs
  when: nfs_storage
  tags: nfs
  ansible.builtin.import_tasks:
    file: storage/nfs.yml

- name: Add ISO files
  tags: ISO
  ansible.builtin.import_tasks:
    file: ISO.yml

- name: Run undo settings on node
  tags: undo
  ansible.builtin.import_tasks:
    file: undo.yml

- name: Delete current user token
  tags: always
  ansible.builtin.command: "pveum user token delete {{ proxmox_api_user }} {{ proxmox_token_id }} "
  changed_when: discovered_delete_token.rc == 0
  failed_when: discovered_delete_token.rc not in [ 0, 255]
  register: discovered_delete_token
