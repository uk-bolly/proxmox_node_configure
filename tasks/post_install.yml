---

- name: Correcting Proxmox VE Sources - firmware.conf
  when: not proxmox_enterprise
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/no-{{ ansible_distribution_release }}-firmware.conf
    line: 'APT::Get::Update::SourceListWarnings::NonFreeFirmware "false";'
    create: true
    mode: '0644'

- name: Disable Proxmox VE enterprise sources
  when:
    - not proxmox_enterprise
    - proxmox_disable_enterprise_sources
  vars:
    source_file: /etc/apt/sources.list.d/pve-enterprise.sources
  block:
  - name: Disable Proxmox VE enterprise sources | Check file exists
    ansible.builtin.stat:
      path: "{{ source_file }}"
    register: discovered_enterprise_source

  - name: Disable Proxmox VE enterprise sources
    when: discovered_enterprise_source.stat.exists
    block:
    - name: Disable Proxmox VE enterprise sources | Copy file
      ansible.builtin.copy:
        src: "{{ source_file }}"
        dest: "{{ source_file }}-disabled"
        remote_src: true

    - name: Disable Proxmox VE enterprise sources | Remove original
      ansible.builtin.file:
        path: "{{ source_file }}"
        state: absent

- name: Disable Proxmox VE ceph sources
  when:
    - not proxmox_enterprise
    - proxmox_disable_ceph
  vars:
    source_file: /etc/apt/sources.list.d/ceph.sources
  block:
  - name:  Disable Proxmox VE ceph sources | Check file exists
    ansible.builtin.stat:
      path: "{{ source_file }}"
    register: discovered_ceph_source

  - name: Disable Proxmox VE enterprise sources
    when: discovered_ceph_source.stat.exists
    block:
    - name:  Disable Proxmox VE ceph sources | Copy file
      ansible.builtin.copy:
        src: "{{ source_file }}"
        dest: "{{ source_file }}-disabled"
        remote_src: true

    - name:  Disable Proxmox VE ceph sources | Remove original
      ansible.builtin.file:
        path: "{{ source_file }}"
        state: absent

- name: Add no subscription repo
  when:
  - not proxmox_enterprise
  - proxmox_no_subscription_repo
  ansible.builtin.template:
    src: pve-install-repo.sources.j2
    dest: /etc/apt/sources.list.d/pve-install-repo.sources
    mode: '0644'

- name: Adding 'pvetest' repository and set disabled
  when:
  - not proxmox_enterprise
  - proxmox_beta_test_repo
  ansible.builtin.template:
    src: pvetest-for-beta.sources.j2
    dest: /etc/apt/sources.list.d/pvetest-for-beta.sources
    mode: '0644'

- name: Disable subscription reminder
  when: proxmox_disable_subscription_reminder
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: 'nonag_sh.j2', dest: '/usr/local/bin/pve-remove-nag.sh', mode: '0754' }
    - { src: 'nonag_conf.j2', dest: '/etc/apt/apt.conf.d/no-nag-script', mode: '0644' }
  notify: Reinstall proxmox-toolkit

- name: Disable unnecessary HA resources - single node
  when:
  - proxmox_single_node
  - proxmox_ha_disable
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
  - pve-ha-lrm
  - pve-ha-crm

- name: Disable unnecessary corosync resources - single node
  when:
  - proxmox_single_node
  - proxmox_corosync_disable
  ansible.builtin.systemd:
    name: corosync
    enabled: false
    state: stopped

- name: Update to latest packages
  when: apply_updates
  ansible.builtin.package:
    name: "*"
    state: latest
    update_cache: true
  notify: Reboot check

- name: Disable IPv6
  when: disable_ipv6
  tags: ipv6
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: true
  loop:
  - "net.ipv6.conf.all.disable_ipv6"
  - "net.ipv6.conf.default.disable_ipv6"
