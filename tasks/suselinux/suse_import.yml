    api_token_secret: "{{ proxmox_api_token_secret }}"
    content_type: import
    validate_certs: "{{ validate_certs }}"
    node: "{{ ansible_host }}"
    storage: proxmox_nfs
    url: "{{ suse_image_url }}{{ item.version }}.{{ item.release }}/appliances/openSUSE-{{ item.osname }}-{{ item.version }}.{{ item.release }}-Minimal-VM.aarch64-Cloud.qcow2"
    force: false
    timeout: 1800
