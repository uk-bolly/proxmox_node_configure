    storage: proxmox_nfs
    url: "https://cdimage.ubuntu.com/releases/{{ item.major }}.{{ item.minor }}/release/ubuntu-{{ item.major }}.{{ item.minor }}.{{ item.min }}-live-server-arm64.iso"
    # checksum: "aed9449cf79eb2d1c365f4f2561f923a80451b3e8fdbf595889b4cf0ac6c58b8"
    # checksum_algorithm: sha256
    template: "ubuntu-{{ item.major }}.{{ item.minor }}.{{ item.min }}-live-server-arm64.iso"
