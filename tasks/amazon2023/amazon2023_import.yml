    node: "{{ ansible_host }}"
    storage: proxmox_nfs
    url: "{{ amazon2023_image_url }}/os-images/{{ item.os_version }}/kvm/al2023-kvm-2023.{{ item.os_version }}-kernel-6.1-arm64.xfs.gpt.qcow2"
    force: false
    timeout: 1800
