---

min_ansible_version: 2.17.1

# Ability to output debug for investigation
# With debugs throughout the tasks this will help to find where issues maybe
debug_vars: false

# file to show setting for proxmox configuration

# If just a single node and not cluster
proxmox_single_node: false

# If server has a proxmox subscription
proxmox_enterprise: false

# Disable subscription sources
# When not enterprise
proxmox_disable_enterprise_sources: true

# Disabled ceph repos if not using ceph storage
proxmox_disable_ceph: true

# Add the no subscription repo
# When not enterprise
proxmox_no_subscription_repo: true

# Add the beta test repo
proxmox_beta_test_repo: true

# Enable the beta_test repo
proxmox_beta_enable: false

# Turn off subscription reminder
# When not enterprise
proxmox_disable_subscription_reminder: true

cluster_name: homelab

# Turn off HA service
# When single node true
proxmox_ha_disable: false

# Turn off corosync services
# When single node true
proxmox_corosync_disable: true

## Allow latest packages to be installed
# Will reboot if required
apply_updates: true

## Disable ipv6
disable_ipv6: true

## API settings
create_api_user: true
proxmox_api_url: "{{ ansible_host }}"
proxmox_api_port: 8006
proxmox_api_user: 'ansible_api@pve'
proxmox_token_id: ansible
validate_certs: false
# The following are created and discovered during the play, but can be set manually
# The option to create user needs to be false if you set the following
# proxmox_api_token_id : # Make sure values is not full string as per proxmox e.g user@pam!token_name only token_name is variable
# proxmox_api_token_secret: This is created and discovered

## Storage

# Backup
backup_storage: false
backup_server: proxmox-backup-server.example.com
backup_username: backup@pbs
backup_password: ######
backup_datastore: backup
backup_fingerprint: "F3:04:D2:C1:33:B7:35:B9:88:D8:7A:24:85:21:DC:75:EE:7C:A5:2A:55:2D:99:38:6B:48:5E:CA:0D:E3:FE:66"
backup_export: "/mnt/storage01/b01pbs01"

# ISCSI
iscsi_storage: false
iscsi:
iscsi_portal:
iscsi_target:
iscsi_content:
  - "rootdir"
  - "images"
  - "iso"
  - "import"

# NFS
nfs_storage: false
nfs_server:
  - ip: xx.xx.xx.xx
    export: /nfs/someting
    content:
      - "rootdir"
      - "images"
      - "iso"
      - "import"

# Resource Pools
# Resource pools created where these are used during VM/container deployments
resource_pools:
  - debian
  - el8
  - el9
  - el10
  - el11
  - suse
  - ubuntu
  - win_host
  - win_server

## OSs
# Each OS type has various option
# Windows not yet worked upon
## listed as shown
# {os_name}_iso  - This states to download ISOs
# {os_name}_image - This downloads the supplied image and imports direct from the vendor qcow2 format
# {os_name}_amd64 - This downloads amd64/x86_64 versions of the iso
# {os_name}_arm64 - This downloads arm64/aarch64 versions of the iso
# {os_name}_releases - This is a list of Versions and release that you wish to download of the ISOimage

alma_iso: true
alma_image: true
alma_amd64: true
alma_arm64: true
alma_releases:
  - os_version: 9
    os_release: 7
  - os_version: 10
    os_release: 1

oracle_iso: true
oracle_amd64: true
oracle_arm64: false
oracle_image: true
# Images this is set to get the latest release from the version number
oracle_releases:
  - os_version: 9
    os_release: 7
  - os_version: 10
    os_release: 1

rocky_iso: true
rocky_amd64: true
rocky_arm64: true
rocky_image: true
rocky_releases:
  - os_version: 8
    os_release: 10
  - os_version: 9
    os_release: 6
  - os_version: 10
    os_release: 1

# SUSE based releases
suse_iso: true
suse_amd64: true
suse_arm64: true
suse_image: true
suse_releases:
  - os_version: 15
    os_release: '6'
    osname: Leap

# Ubuntu Releases
ubuntu_iso: true
ubuntu_amd64: true
ubuntu_arm64: true
ubuntu_image: false
ubuntu_releases:
  - os_version: 22
    os_release: '04'
    min: 5
  - os_version: 24
    os_release: '04'
    min: 3

# Debian based releases
deb_iso: true
debian_amd64: true
debian_arm64: true
debian_image: false
debian_release:
  - major: 12
    minor: 12
  - major: 13
    minor: 2

# Packer variable defaults
# Others can be seen in vars/main.yml

proxmox_vm_cpu_type: host
proxmox_vm_cpu_sockets: 1
proxmox_vm_cpu_core: 2
proxmox_vm_memory: 2048
