---

# Defaults that shouldn't need changing
reboot_required: false

api_privileges:
  - Datastore.Allocate
  - Datastore.AllocateSpace
  - Datastore.AllocateTemplate
  - Datastore.Audit
  - Group.Allocate
  - Mapping.Audit
  - Mapping.Use
  - Pool.Allocate
  - Pool.Audit
  - Realm.AllocateUser
  - SDN.Allocate
  - SDN.Audit
  - SDN.Use
  - Sys.AccessNetwork
  - Sys.Audit
  - Sys.Console
  - Sys.Syslog
  - User.Modify
  - VM.Allocate
  - VM.Audit
  - VM.Backup
  - VM.Clone
  - VM.Config.CDROM
  - VM.Config.CPU
  - VM.Config.Cloudinit
  - VM.Config.Disk
  - VM.Config.HWType
  - VM.Config.Memory
  - VM.Config.Network
  - VM.Config.Options
  - VM.Console
  - VM.GuestAgent.Audit
  - VM.GuestAgent.FileRead
  - VM.GuestAgent.FileSystemMgmt
  - VM.GuestAgent.FileWrite
  - VM.GuestAgent.Unrestricted
  - VM.Migrate,VM.PowerMgmt
  - VM.Replicate
  - VM.Snapshot
  - VM.Snapshot.Rollback

# EL Vendors and release
download_el: true
download_alma: true
alma_url: https://repo.almalinux.org/almalinux/
alma_amd64: true
alma_arm64: true
download_oracle: true
oracle_url: https://yum.oracle.com/ISOS/OracleLinux/
oracle_amd64: true
oracle_arm64: true
# Note you will need either enterprise or developer account to enable this
download_rhel: false
rhel_url:
download_rocky: true
rocky_url: https://download.rockylinux.org/pub/rocky/
rocky_amd64: true
rocky_arm64: true
el_releases:
  - major: 8
    minor: 10
  - major: 9
    minor: 6
  - major: 10
    minor: 0

# SUSE based releases
download_suse: true
suse_amd64: true
suse_arm64: false
suse_releases:
  - major: 15
    minor: 6
    osname: Leap
suse_url: https://download.opensuse.org/distribution/leap/

# Debian based releases
download_deb: true
deb_rels:
  - major: 12
    minor: 12
  - major: 13
    minor: 2

debian_url: https://cdimage.debian.org/

# Ubuntu Releases
download_ubuntu: true
ubuntu_amd64: true
ubuntu_arm64: true
ubuntu_releases:
  - major: 22
    minor: '04'
    min: 5
  - major: 24
    minor: '04'
    min: 3
ubuntu_url: https://releases.ubuntu.com/
