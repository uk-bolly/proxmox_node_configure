---

# Defaults that shouldn't need changing
reboot_required: false

# Minimum to allow fill playbook and configurations
api_privileges:
  - Datastore.Allocate
  - Datastore.AllocateSpace
  - Datastore.AllocateTemplate
  - Datastore.Audit
  - Group.Allocate
  - Mapping.Audit
  - Mapping.Use
  - Pool.Allocate
  - Pool.Audit
  - Realm.AllocateUser
  - SDN.Allocate
  - SDN.Audit
  - SDN.Use
  - Sys.AccessNetwork
  - Sys.Audit
  - Sys.Console
  - Sys.Syslog
  - User.Modify
  - VM.Allocate
  - VM.Audit
  - VM.Backup
  - VM.Clone
  - VM.Config.CDROM
  - VM.Config.CPU
  - VM.Config.Cloudinit
  - VM.Config.Disk
  - VM.Config.HWType
  - VM.Config.Memory
  - VM.Config.Network
  - VM.Config.Options
  - VM.Console
  - VM.GuestAgent.Audit
  - VM.GuestAgent.FileRead
  - VM.GuestAgent.FileSystemMgmt
  - VM.GuestAgent.FileWrite
  - VM.GuestAgent.Unrestricted
  - VM.Migrate
  - VM.PowerMgmt
  - VM.Replicate
  - VM.Snapshot
  - VM.Snapshot.Rollback

# Packer templates

bootloader:
  - name: bios
    type: "seabios"
    command: "<tab><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs><bs>inst.text inst.ks=http://'{{ .HTTPIP }}:{{ .HTTPPort }}'/{{ os_version }}-bios-ks.cfg<enter><wait>"
  - name: efi
    type: "ovmf"
    command: "e<down><down><end><bs><bs><bs><bs><bs>inst.text inst.nompath inst.ks=http://'{{ .HTTPIP }}:{{ .HTTPPort }}'/{{ os_version }}-efi-ks.cfg<leftCtrlOn>x<leftCtrlOff>"
